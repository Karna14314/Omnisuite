# Allocate healthy memory budget to prevent Java heap space errors during kapt and code compilation
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

# Enable AndroidX
android.useAndroidX=true

# Jetifier is not needed as this codebase uses modern AndroidX natively
android.enableJetifier=false

# Suppress compile SDK target mismatch warnings
android.suppressUnsupportedCompileSdk=36
